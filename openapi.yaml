openapi: 3.0.3
info:
  title: SRE Platform API
  description: |-
    SRE 平台的後端 API 服務，提供事件、資源、儀表板、自動化、通知等管理功能。
    所有 API 皆需通過身分驗證。
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: 開發環境 Mock Server

tags:
  - name: 事件管理 (Events)
    description: 處理事件、事件規則與靜音規則
  - name: 資源管理 (Resources)
    description: 管理基礎設施資源、資源群組與拓撲
  - name: 儀表板 (Dashboards)
    description: 管理儀表板、洞察與戰情室
  - name: 自動化 (Automation)
    description: 管理自動化腳本、排程與執行紀錄
  - name: 通知 (Notifications)
    description: 管理通知策略、管道與歷史紀錄
  - name: 設定 (Settings)
    description: 管理系統層級設定
  - name: 個人偏好 (Profile)
    description: 管理使用者個人資料與偏好設定

paths:
  # =================================================================
  # 事件管理 (Events)
  # =================================================================
  /events:
    get:
      tags:
        - 事件管理 (Events)
      summary: 取得事件列表
      description: 根據篩選條件取得分頁的事件列表。
      operationId: listEvents
      parameters:
        - name: q
          in: query
          description: '統一搜索關鍵字 (事件 ID, 摘要, 資源名稱)'
          schema:
            type: string
        - name: status
          in: query
          description: '狀態篩選 (new, ack, resolved, silence)'
          schema:
            type: string
        - name: severity
          in: query
          description: '嚴重程度篩選 (critical, warning, info)'
          schema:
            type: string
        - name: resource_type
          in: query
          description: '資源類型篩選'
          schema:
            type: string
        - name: assignee_id
          in: query
          description: '處理人 ID'
          schema:
            type: string
        - name: start_time
          in: query
          description: '開始時間 (ISO 8601)'
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          description: '結束時間 (ISO 8601)'
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          description: '頁碼'
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: '每頁數量'
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功取得事件列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Event'
                  total:
                    type: integer
                    description: '總事件數量'
  /events/{id}:
    get:
      tags:
        - 事件管理 (Events)
      summary: 取得單一事件詳情
      operationId: getEventById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功取得事件詳情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDetail'
  /event-rules:
    get:
      tags:
        - 事件管理 (Events)
      summary: 取得事件規則列表
      operationId: listEventRules
      responses:
        '200':
          description: 成功取得事件規則列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventRule'
    post:
      tags:
        - 事件管理 (Events)
      summary: 建立新的事件規則
      operationId: createEventRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventRule'
      responses:
        '201':
          description: 建立成功
  /event-rules/{id}:
    put:
      tags:
        - 事件管理 (Events)
      summary: 更新事件規則
      operationId: updateEventRule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventRule'
      responses:
        '200':
          description: 更新成功
    delete:
      tags:
        - 事件管理 (Events)
      summary: 刪除事件規則
      operationId: deleteEventRule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 刪除成功
  /silences:
    get:
      tags:
        - 事件管理 (Events)
      summary: 取得靜音規則列表
      operationId: listSilences
      responses:
        '200':
          description: 成功取得靜音規則列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Silence'
    post:
      tags:
        - 事件管理 (Events)
      summary: 建立靜音規則
      operationId: createSilence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Silence'
      responses:
        '201':
          description: 建立成功
  /silences/{id}:
    put:
      tags:
        - 事件管理 (Events)
      summary: 更新靜音規則
      operationId: updateSilence
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Silence'
      responses:
        '200':
          description: 更新成功
    delete:
      tags:
        - 事件管理 (Events)
      summary: 刪除靜音規則
      operationId: deleteSilence
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 刪除成功

  # =================================================================
  # 資源管理 (Resources)
  # =================================================================
  /resources:
    get:
      tags:
        - 資源管理 (Resources)
      summary: 取得資源列表
      operationId: listResources
      responses:
        '200':
          description: 成功取得資源列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Resource'
    post:
      tags:
        - 資源管理 (Resources)
      summary: 新增資源
      operationId: createResource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Resource'
      responses:
        '201':
          description: 建立成功
  /resources/{id}:
    get:
      tags:
        - 資源管理 (Resources)
      summary: 取得資源詳情
      operationId: getResourceById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
    put:
      tags:
        - 資源管理 (Resources)
      summary: 更新資源
      operationId: updateResource
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Resource'
      responses:
        '200':
          description: 更新成功
    delete:
      tags:
        - 資源管理 (Resources)
      summary: 刪除資源
      operationId: deleteResource
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 刪除成功
  /resource-groups:
    get:
      tags:
        - 資源管理 (Resources)
      summary: 取得資源群組列表
      operationId: listResourceGroups
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ResourceGroup'
  /topology:
    get:
      tags:
        - 資源管理 (Resources)
      summary: 取得拓撲視圖
      operationId: getTopology
      responses:
        '200':
          description: 成功

  # =================================================================
  # 儀表板 (Dashboards)
  # =================================================================
  /dashboards:
    get:
      tags:
        - 儀表板 (Dashboards)
      summary: 取得儀表板列表
      operationId: listDashboards
      responses:
        '200':
          description: 成功取得儀表板列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dashboard'
    post:
      tags:
        - 儀表板 (Dashboards)
      summary: 新增儀表板
      operationId: createDashboard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Dashboard'
      responses:
        '201':
          description: 建立成功
  /dashboards/{id}:
    get:
      tags:
        - 儀表板 (Dashboards)
      summary: 取得儀表板詳情
      operationId: getDashboardById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
    put:
      tags:
        - 儀表板 (Dashboards)
      summary: 更新儀表板
      operationId: updateDashboard
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Dashboard'
      responses:
        '200':
          description: 更新成功
    delete:
      tags:
        - 儀表板 (Dashboards)
      summary: 刪除儀表板
      operationId: deleteDashboard
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 刪除成功
  /insights:
    get:
      tags:
        - 儀表板 (Dashboards)
      summary: 取得基礎設施洞察
      operationId: getInsights
      responses:
        '200':
          description: 成功
  /war-room:
    get:
      tags:
        - 儀表板 (Dashboards)
      summary: 取得 SRE 戰情室資料
      operationId: getWarRoomData
      responses:
        '200':
          description: 成功

  # =================================================================
  # 自動化 (Automation)
  # =================================================================
  /scripts:
    get:
      tags:
        - 自動化 (Automation)
      summary: 取得腳本列表
      operationId: listScripts
      responses:
        '200':
          description: 成功取得腳本列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Script'
    post:
      tags:
        - 自動化 (Automation)
      summary: 新增腳本
      operationId: createScript
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Script'
      responses:
        '201':
          description: 建立成功
  /scripts/{id}:
    put:
      tags:
        - 自動化 (Automation)
      summary: 更新腳本
      operationId: updateScript
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Script'
      responses:
        '200':
          description: 更新成功
    delete:
      tags:
        - 自動化 (Automation)
      summary: 刪除腳本
      operationId: deleteScript
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 刪除成功
  /schedules:
    get:
      tags:
        - 自動化 (Automation)
      summary: 取得排程列表
      operationId: listSchedules
      responses:
        '200':
          description: 成功
  /executions:
    get:
      tags:
        - 自動化 (Automation)
      summary: 取得執行日誌
      operationId: listExecutions
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Execution'

  # =================================================================
  # 通知 (Notifications)
  # =================================================================
  /notification-policies:
    get:
      tags:
        - 通知 (Notifications)
      summary: 取得通知策略列表
      operationId: listNotificationPolicies
      responses:
        '200':
          description: 成功取得通知策略列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationPolicy'
    post:
      tags:
        - 通知 (Notifications)
      summary: 新增通知策略
      operationId: createNotificationPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationPolicy'
      responses:
        '201':
          description: 建立成功
  /notification-policies/{id}:
    put:
      tags:
        - 通知 (Notifications)
      summary: 更新通知策略
      operationId: updateNotificationPolicy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationPolicy'
      responses:
        '200':
          description: 更新成功
    delete:
      tags:
        - 通知 (Notifications)
      summary: 刪除通知策略
      operationId: deleteNotificationPolicy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 刪除成功
  /channels:
    get:
      tags:
        - 通知 (Notifications)
      summary: 取得通知管道列表
      operationId: listChannels
      responses:
        '200':
          description: 成功
  /notifications:
    get:
      tags:
        - 通知 (Notifications)
      summary: 取得通知歷史
      operationId: listNotifications
      responses:
        '200':
          description: 成功

  # =================================================================
  # 設定 (Settings)
  # =================================================================
  /labels:
    get:
      tags:
        - 設定 (Settings)
      summary: 取得標籤列表
      operationId: listLabels
      responses:
        '200':
          description: 成功取得標籤列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Label'
  /mail-settings:
    get:
      tags:
        - 設定 (Settings)
      summary: 取得郵件設定
      operationId: getMailSettings
      responses:
        '200':
          description: 成功
    put:
      tags:
        - 設定 (Settings)
      summary: 更新郵件設定
      operationId: updateMailSettings
      responses:
        '200':
          description: 更新成功
  /auth-settings:
    get:
      tags:
        - 設定 (Settings)
      summary: 取得身份驗證設定
      operationId: getAuthSettings
      responses:
        '200':
          description: 成功
    put:
      tags:
        - 設定 (Settings)
      summary: 更新身份驗證設定
      operationId: updateAuthSettings
      responses:
        '200':
          description: 更新成功

  # =================================================================
  # 個人偏好 (Profile)
  # =================================================================
  /profile:
    get:
      tags:
        - 個人偏好 (Profile)
      summary: 取得個人資料
      operationId: getProfile
      responses:
        '200':
          description: 成功取得個人資料
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /preferences:
    get:
      tags:
        - 個人偏好 (Profile)
      summary: 取得個人偏好設定
      operationId: getPreferences
      responses:
        '200':
          description: 成功取得個人偏好設定
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferences'
    put:
      tags:
        - 個人偏好 (Profile)
      summary: 更新個人偏好設定
      operationId: updatePreferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPreferences'
      responses:
        '200':
          description: 更新成功

components:
  schemas:
    # ===============================================================
    # 通用模型
    # ===============================================================
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        display_name:
          type: string
        email:
          type: string
          format: email
        teams:
          type: array
          items:
            type: string
        roles:
          type: array
          items:
            type: string

    # ===============================================================
    # 事件管理模型
    # ===============================================================
    Event:
      type: object
      properties:
        id:
          type: string
          description: '事件 ID'
        summary:
          type: string
          description: '摘要'
        resource_name:
          type: string
          description: '資源名稱'
        service_impact:
          type: string
          description: '服務影響'
        rule_name:
          type: string
          description: '規則名稱'
        trigger_threshold:
          type: string
          description: '觸發閾值'
        status:
          type: string
          enum: [new, ack, resolved, silence]
          description: '狀態'
        assignee:
          type: string
          description: '處理人'
        trigger_time:
          type: string
          format: date-time
          description: '觸發時間'

    EventDetail:
      allOf:
        - $ref: '#/components/schemas/Event'
        - type: object
          properties:
            description:
              type: string
            history:
              type: array
              items:
                $ref: '#/components/schemas/EventHistory'
            related_events:
              type: array
              items:
                $ref: '#/components/schemas/Event'
            automation_logs:
              type: array
              items:
                $ref: '#/components/schemas/Execution'

    EventHistory:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        user:
          type: string
        action:
          type: string
          description: '例如: 狀態從 new 改為 ack'

    EventRule:
      type: object
      properties:
        id:
          type: string
        enabled:
          type: boolean
        name:
          type: string
        target:
          type: string
          description: '監控對象'
        conditions:
          type: string
          description: '觸發條件'
        severity:
          type: string
          enum: [critical, warning, info]
        automation_enabled:
          type: boolean
        creator:
          type: string
        last_updated:
          type: string
          format: date-time

    Silence:
      type: object
      properties:
        id:
          type: string
        enabled:
          type: boolean
        name:
          type: string
        silence_type:
          type: string
          enum: [single, repeat, condition]
        matchers:
          type: string
          description: '匹配條件'
        time_range:
          type: string
          description: '靜音期間'
        scope:
          type: string
          description: '靜音範圍'
        creator:
          type: string
        created_at:
          type: string
          format: date-time

    # ===============================================================
    # 資源管理模型
    # ===============================================================
    Resource:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [healthy, warning, critical]
        name:
          type: string
        ip_address:
          type: string
        location:
          type: string
        type:
          type: string
          enum: [Server, Database, Cache, Gateway, Service]
        os:
          type: string
        cpu:
          type: number
          format: float
        memory:
          type: number
          format: float
        disk:
          type: number
          format: float
        network:
          type: string
        updated_at:
          type: string
          format: date-time

    ResourceGroup:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        owner:
          type: string
        members:
          type: integer
        subscribers:
          type: integer
        created_at:
          type: string
          format: date-time

    # ===============================================================
    # 儀表板模型
    # ===============================================================
    Dashboard:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        owner:
          type: string
        views_favorites:
          type: string
        updated_at:
          type: string
          format: date-time

    # ===============================================================
    # 自動化模型
    # ===============================================================
    Script:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [Shell, Python, Ansible, Terraform]
        description:
          type: string
        version:
          type: string
        updated_at:
          type: string
          format: date-time
        last_execution_status:
          type: string

    Execution:
      type: object
      properties:
        execution_id:
          type: string
        script_name:
          type: string
        trigger_source:
          type: string
        start_time:
          type: string
          format: date-time
        duration:
          type: string
        status:
          type: string

    # ===============================================================
    # 通知模型
    # ===============================================================
    NotificationPolicy:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        trigger_condition:
          type: string
        channel_count:
          type: integer
        recipients:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [enabled, disabled]
        priority:
          type: string
          enum: [high, medium, low]

    # ===============================================================
    # 設定模型
    # ===============================================================
    Label:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        values:
          type: array
          items:
            type: string
        required:
          type: boolean
        usage_count:
          type: integer

    # ===============================================================
    # 個人偏好模型
    # ===============================================================
    UserPreferences:
      type: object
      properties:
        theme:
          type: string
